<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  .section-divider { text-align: center; padding: 20px 0 10px; opacity: 0; animation: slideUp 0.35s ease forwards; }

  .cc-score { margin-top: 14px; text-align: center; font-size: 0.9rem; font-weight: 700; color: #00695c; display: none; }

  .drag-chip:hover { background: #c5cae9; } .drag-chip.dragging { opacity: 0.4; }
  .drag-chip.used { opacity: 0.3; cursor: default; border-style: dashed; }
  .drag-slot { display: inline-block; min-width: 60px; padding: 3px 10px; margin: 0 2px; border: 2px dashed #7986cb; border-radius: 6px; background: rgba(255,255,255,0.7); font-family: 'Cascadia Code','Fira Code',Consolas,monospace; font-size: 0.88em; text-align: center; min-height: 1.6em; vertical-align: middle; transition: all 0.2s; cursor: pointer; }
  .drag-slot.dragover { background: #c5cae9; border-color: #3949ab; }

  .drag-slot.correct { background: #c8e6c9; border-color: var(--success); border-style: solid; }
  .drag-slot.wrong { background: #ffcdd2; border-color: var(--danger); border-style: solid; }
  .fill-check-btn { display: block; margin: 14px auto 0; padding: 8px 24px; background: #3f51b5; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 0.88rem; }
  .fill-check-btn:hover { background: #283593; } .fill-check-btn:disabled { opacity: 0.4; cursor: default; }
  .fill-feedback { margin-top: 10px; padding: 8px 12px; border-radius: 6px; font-size: 0.85rem; display: none; text-align: center; }
  .fill-feedback.show { display: block; } .fill-feedback.correct { background: #c8e6c9; color: #1b5e20; } .fill-feedback.wrong { background: #ffcdd2; color: #b71c1c; }
  .completion { text-align: center; padding: 40px 20px; opacity: 0; animation: slideUp 0.5s ease forwards; }
  .completion h2 { font-size: 1.5rem; margin-bottom: 12px; color: var(--primary); }
  .completion p { color: var(--text-light); margin: 6px 0; }
  .completion .summary-table { margin: 20px auto; border-collapse: collapse; font-size: 0.9rem; }
  .completion .summary-table th, .completion .summary-table td { padding: 8px 16px; border: 1px solid #e0e0e0; text-align: left; }

  .restart-btn { margin-top: 20px; padding: 10px 28px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; font-family: inherit; }
  .restart-btn:hover { background: #0d47a1; }
  footer { position: fixed; bottom: 0; left: 0; right: 0; height: var(--footer-h); background: #fff; border-top: 1px solid #e0e0e0; display: flex; align-items: center; justify-content: center; gap: 16px; padding: 0 20px; z-index: 100; }
  .nav-btn { padding: 10px 32px; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s; }
  .nav-btn:disabled { opacity: 0.4; cursor: default; }
  .btn-prev { background: #e0e0e0; color: var(--text); } .btn-prev:hover:not(:disabled) { background: #bdbdbd; }
  .btn-next { background: var(--primary); color: #fff; } .btn-next:hover:not(:disabled) { background: #0d47a1; }

    .bubble, .keypoint, .quiz-card, .flashcard-container, .drag-fill-card, .match-card, .compile-check-card { max-width: 92%; font-size: 0.9rem; }

  }
</style>

<header>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/rust.min.js"></script>
<script>
const SECTIONS = [
  {
    title: "1. 구조체 기본 — struct로 데이터 묶기",
    steps: [
      { type: "teacher", html: `<p>ch02에서 튜플로 여러 값을 묶었죠? <code>person.0</code>, <code>person.1</code> 이러면 뭐가 뭔지 모르잖아요. 그래서 <strong>이름 붙은 필드</strong>로 묶는 게 구조체예요.</p>
<pre><code class="language-rust">struct User {
    name: String,
    age: u32,
    active: bool,
}

let user = User {
    name: String::from("철수"),
    age: 25,
    active: true,
};
println!("{}", user.name);  // "철수"</code></pre>
<p>C++의 <code>struct</code>나 <code>class</code>랑 비슷해요. 다만 Rust는 <strong><code>struct</code>만 있고 <code>class</code>가 없어요.</strong></p>` },
      { type: "student", html: `<p>C++ class랑 뭐가 달라?</p>` },
      { type: "teacher", html: `<p>핵심 차이를 정리하면:</p>
<table><tr><th></th><th>C++ class</th><th>Rust struct</th></tr>
<tr><td>기본 접근</td><td>private</td><td>private (같은 모듈 내에선 접근 가능)</td></tr>
<tr><td>상속</td><td>O (class 상속)</td><td>X (trait으로 대체)</td></tr>
<tr><td>메서드</td><td>class 안에 정의</td><td>impl 블록에 따로 정의</td></tr>
<tr><td>생성자</td><td>constructor</td><td>연관 함수 (관례: new())</td></tr>
<tr><td>소멸자</td><td>destructor</td><td>Drop trait</td></tr></table>
<p>가장 큰 차이: <strong>Rust에는 상속이 없어요.</strong> 대신 trait(ch10)과 합성(composition)을 써요.</p>` },
      { type: "student", html: `<p>mut은 필드별로 설정 못 해?</p>` },
      { type: "teacher", html: `<p>아뇨, Rust는 <strong>인스턴스 단위</strong>로 mut을 정해요.</p>
<pre><code class="language-rust">let mut user = User { name: String::from("철수"), age: 25, active: true };
user.age = 26;        // OK — 인스턴스가 mut이니까 전부 수정 가능

let user2 = User { name: String::from("영희"), age: 30, active: true };
// user2.age = 31;    // 에러! user2는 불변</code></pre>
<p>C++처럼 필드별로 <code>const</code> 붙이는 건 안 돼요. 전체가 불변이거나 전체가 가변이에요.</p>` },
      { type: "keypoint", html: `<ul><li><code>struct</code>로 이름 붙은 필드로 데이터 묶기</li><li>Rust에는 class 없음 — struct + impl로 대체</li><li>mut은 인스턴스 단위 (필드별 X)</li><li>상속 없음 → trait + 합성으로 대체</li></ul>` }
    ],
    quiz: {
      question: "Rust 구조체에 대한 설명으로 틀린 것은?",
      options: [
        "struct의 필드는 기본적으로 private이다",
        "<code>let mut</code>으로 선언하면 모든 필드를 수정할 수 있다",
        "필드별로 mut을 설정할 수 있다",
        "Rust에는 class가 없다"
      ],
      answer: 2,
      explanation: "Rust에서 mut은 인스턴스 단위예요. 필드별로 mut을 따로 설정할 수 없어요."
    }
  },
  {
    title: "2. 메서드와 impl",
    steps: [
      { type: "teacher", html: `<p>구조체에 메서드를 붙이려면 <code>impl</code> 블록을 써요.</p>
<pre><code class="language-rust">struct Rectangle {
    width: f64,
    height: f64,
}

impl Rectangle {
    fn area(&self) -> f64 {           // &self = 읽기 빌림
        self.width * self.height
    }

    fn scale(&mut self, factor: f64) { // &mut self = 수정 빌림
        self.width *= factor;
        self.height *= factor;
    }
}

let mut rect = Rectangle { width: 10.0, height: 5.0 };
println!("넓이: {}", rect.area());  // 50.0
rect.scale(2.0);
println!("넓이: {}", rect.area());  // 200.0</code></pre>` },
      { type: "student", html: `<p><code>&self</code>가 뭐야? ch05에서 배운 빌림이랑 관련 있어?</p>` },
      { type: "teacher", html: `<p>정확해요! <code>self</code>의 세 가지 형태가 ch05 소유권과 직결돼요:</p>
<table><tr><th>매개변수</th><th>의미</th><th>ch05 대응</th></tr>
<tr><td><code>&self</code></td><td>읽기 빌림</td><td><code>&T</code> — 값 안 바꿈</td></tr>

function renderSectionDivider(t) { const d=document.createElement("div"); d.className="section-divider"; d.innerHTML=`<span>${t}</span>`; return d; }
function renderQuiz(q,si) { const d=document.createElement("div"); d.className="quiz-card"; d.innerHTML=`<h3>퀴즈</h3><p style="margin-bottom:12px;">${q.question}</p>`+q.options.map((o,i)=>`<button class="quiz-option" data-idx="${i}">${o}</button>`).join("")+`<div class="quiz-feedback" id="qf-${si}"></div>`; return d; }

function renderFlashcard(config) { const d=document.createElement("div"); d.className="flashcard-container"; d.innerHTML=`<div style="font-size:0.85rem;font-weight:700;color:var(--primary);margin-bottom:10px;text-align:center;">${config.title}</div><div class="flashcard" id="fc-active"><div class="flashcard-face flashcard-front"><div class="flashcard-label">질문</div><div class="flashcard-content" id="fc-front-content"></div><div class="flashcard-hint">클릭해서 뒤집기</div></div><div class="flashcard-face flashcard-back"><div class="flashcard-label">정답</div><div class="flashcard-content" id="fc-back-content"></div><div class="flashcard-hint">클릭해서 돌아가기</div></div></div><div class="flashcard-nav"><button id="fc-prev-btn">이전</button><button id="fc-next-btn">다음</button></div><div class="flashcard-counter" id="fc-counter"></div>`; requestAnimationFrame(()=>{ const cards=config.cards; let idx=0; const fc=d.querySelector("#fc-active"),frontC=d.querySelector("#fc-front-content"),backC=d.querySelector("#fc-back-content"),counter=d.querySelector("#fc-counter"),prevB=d.querySelector("#fc-prev-btn"),nextB=d.querySelector("#fc-next-btn"); function show(){fc.classList.remove("flipped");frontC.innerHTML=cards[idx].front;backC.innerHTML=cards[idx].back;counter.textContent=`${idx+1} / ${cards.length}`;fc.style.minHeight=Math.max(Math.max(frontC.scrollHeight,backC.scrollHeight,100)+80,160)+"px";} fc.addEventListener("click",()=>fc.classList.toggle("flipped")); prevB.addEventListener("click",e=>{e.stopPropagation();if(idx>0){idx--;show();}}); nextB.addEventListener("click",e=>{e.stopPropagation();if(idx<cards.length-1){idx++;show();}}); show(); }); return d; }

function renderMatch(config) { const d=document.createElement("div"); d.className="match-card"; const shuffled=[...config.pairs.map(p=>p.right)].sort(()=>Math.random()-0.5); d.innerHTML=`<h3>${config.title}</h3><p style="font-size:0.83rem;margin-bottom:12px;">왼쪽을 선택한 뒤, 매칭되는 오른쪽을 클릭하세요.</p><div class="match-columns"><div class="match-col"><div class="match-col-label">항목</div>${config.pairs.map((p,i)=>`<div class="match-item match-left" data-idx="${i}">${p.left}</div>`).join("")}</div><div class="match-col"><div class="match-col-label">타입</div>${shuffled.map(r=>`<div class="match-item match-right" data-val="${r}">${r}</div>`).join("")}</div></div><div class="match-feedback"></div>`; requestAnimationFrame(()=>{ let sel=null,mc=0; const ls=d.querySelectorAll(".match-left"),rs=d.querySelectorAll(".match-right"),fb=d.querySelector(".match-feedback"); ls.forEach(el=>{el.addEventListener("click",()=>{if(el.classList.contains("matched"))return;ls.forEach(l=>l.classList.remove("selected"));el.classList.add("selected");sel=el;});}); rs.forEach(el=>{el.addEventListener("click",()=>{if(!sel||el.classList.contains("matched"))return;const li=parseInt(sel.dataset.idx);if(el.dataset.val===config.pairs[li].right){sel.classList.remove("selected");sel.classList.add("matched");el.classList.add("matched");mc++;sel=null;if(mc===config.pairs.length){fb.className="match-feedback show correct";fb.textContent="모두 맞았어요!";}}else{el.classList.add("wrong-flash");setTimeout(()=>el.classList.remove("wrong-flash"),400);}});}); }); return d; }

function renderCompileCheck(config) { const d=document.createElement("div"); d.className="compile-check-card"; d.innerHTML=`<h3>${config.title}</h3>`+config.items.map((item,i)=>{const ce=item.code.replace(/</g,'&lt;').replace(/>/g,'&gt;');return `<div class="cc-item" data-idx="${i}"><pre><code class="language-rust">${ce}</code></pre><div class="cc-buttons"><button class="cc-btn btn-ok" data-choice="ok">컴파일 OK</button><button class="cc-btn btn-err" data-choice="err">컴파일 에러</button></div><div class="cc-explain"></div></div>`;}).join("")+`<div class="cc-score"></div>`; requestAnimationFrame(()=>{ let ans=0,cor=0;const tot=config.items.length,scoreEl=d.querySelector(".cc-score"); config.items.forEach((item,i)=>{const ci=d.querySelectorAll(".cc-item")[i],btns=ci.querySelectorAll(".cc-btn"),exp=ci.querySelector(".cc-explain"); btns.forEach(btn=>{btn.addEventListener("click",()=>{const ch=btn.dataset.choice,ok=(ch==="ok")===item.compiles;btns.forEach(b=>b.disabled=true);if(ok){btn.classList.add("chosen-correct");exp.className="cc-explain show correct";exp.textContent="정답! "+item.explain;cor++;}else{btn.classList.add("chosen-wrong");(item.compiles?ci.querySelector(".btn-ok"):ci.querySelector(".btn-err")).classList.add("chosen-correct");exp.className="cc-explain show wrong";exp.textContent="오답! "+item.explain;}ci.classList.add("resolved");ans++;if(ans===tot){scoreEl.className="cc-score show";scoreEl.textContent=`결과: ${tot}문제 중 ${cor}문제 정답!`+(cor===tot?" 완벽해요!":"");}});}); }); d.querySelectorAll("pre code.language-rust").forEach(el=>hljs.highlightElement(el)); }); return d; }

function renderDragFill(config) { const d=document.createElement("div"); d.className="drag-fill-card"; const am={}; config.blanks.forEach(b=>{am[b.id]=b.answer;}); let ch=config.template; config.blanks.forEach(b=>{ch=ch.replace(`__${b.id}__`,`<span class="drag-slot" data-id="${b.id}" data-filled=""></span>`);}); d.innerHTML=`<h3>${config.title}</h3><p style="font-size:0.85rem;margin-bottom:10px;">${config.description}</p><div class="drag-candidates">${config.candidates.map((c,i)=>`<span class="drag-chip" draggable="true" data-val="${i}">${c}</span>`).join("")}</div><pre><code>${ch}</code></pre><button class="fill-check-btn">확인</button><div class="fill-feedback"></div>`; requestAnimationFrame(()=>{ const chips=d.querySelectorAll(".drag-chip"),slots=d.querySelectorAll(".drag-slot"),checkBtn=d.querySelector(".fill-check-btn"),fb=d.querySelector(".fill-feedback"); let dc=null; chips.forEach(chip=>{chip.addEventListener("dragstart",e=>{if(chip.classList.contains("used")){e.preventDefault();return;}dc=chip;chip.classList.add("dragging");e.dataTransfer.effectAllowed="move";});chip.addEventListener("dragend",()=>{chip.classList.remove("dragging");dc=null;});chip.addEventListener("click",()=>{if(chip.classList.contains("used"))return;chips.forEach(c=>c.classList.remove("dragging"));if(dc===chip){dc=null;return;}dc=chip;chip.classList.add("dragging");});}); slots.forEach(slot=>{slot.addEventListener("dragover",e=>{e.preventDefault();slot.classList.add("dragover");});slot.addEventListener("dragleave",()=>slot.classList.remove("dragover"));slot.addEventListener("drop",e=>{e.preventDefault();slot.classList.remove("dragover");if(dc)placeChip(slot,dc);});slot.addEventListener("click",()=>{if(dc){placeChip(slot,dc);}else if(slot.dataset.filled!==""){const ci=slot.dataset.filled,chip=d.querySelector(`.drag-chip[data-val="${ci}"]`);if(chip)chip.classList.remove("used");slot.textContent="";slot.dataset.filled="";slot.classList.remove("filled","correct","wrong");}});}); function placeChip(slot,chip){if(slot.dataset.filled!==""){const oi=slot.dataset.filled,oc=d.querySelector(`.drag-chip[data-val="${oi}"]`);if(oc)oc.classList.remove("used");}slot.textContent=chip.textContent;slot.dataset.filled=chip.dataset.val;slot.classList.add("filled");slot.classList.remove("correct","wrong");chip.classList.remove("dragging");chip.classList.add("used");dc=null;} checkBtn.addEventListener("click",()=>{let ac=true,af=true;slots.forEach(slot=>{const id=slot.dataset.id,ans=am[id],val=slot.textContent.trim();if(!val){af=false;ac=false;return;}if(val===ans){slot.classList.remove("wrong");slot.classList.add("correct");}else{slot.classList.remove("correct");slot.classList.add("wrong");ac=false;}});if(!af){fb.className="fill-feedback show wrong";fb.textContent="빈칸을 모두 채워주세요!";}else if(ac){fb.className="fill-feedback show correct";fb.textContent="정답! "+config.successMsg;checkBtn.disabled=true;}else{fb.className="fill-feedback show wrong";fb.textContent="틀린 칸이 있어요. 빈칸을 클릭해서 빼고 다시 넣어보세요!";}}); }); return d; }

function renderStep(step) { if(step.type==="flashcard")return renderFlashcard(step.config); if(step.type==="drag-fill")return renderDragFill(step.config); if(step.type==="match")return renderMatch(step.config); if(step.type==="compile-check")return renderCompileCheck(step.config); return renderBubble(step); }

function renderCompletion() { const d=document.createElement("div"); d.className="completion"; d.innerHTML=`<h2>학습 완료!</h2><p>Ch06 구조체 튜토리얼을 모두 마쳤습니다.</p><table class="summary-table"><tr><th>개념</th><th>한 줄 요약</th></tr><tr><td>struct</td><td>이름 붙은 필드로 데이터 묶기</td></tr><tr><td>impl</td><td>메서드와 연관 함수 정의 블록</td></tr><tr><td>&self / &mut self / self</td><td>읽기 빌림 / 수정 빌림 / 소유권 이동</td></tr><tr><td>::</td><td>연관 함수 호출 (타입에 붙음)</td></tr><tr><td>.</td><td>메서드 호출 (인스턴스에 붙음)</td></tr><tr><td>#[derive]</td><td>컴파일러 자동 구현</td></tr></table><p style="margin-top:16px;font-size:0.9rem;">다음: <strong>Ch07 열거형과 패턴 매칭</strong></p><button class="restart-btn" onclick="restart()">처음부터 다시</button>`; return d; }

function makeInstant(el){el.style.animation="none";el.style.opacity="1";el.style.transform="none";}
function isQuizStep(){return state.stepIdx>=SECTIONS[state.sectionIdx].steps.length;}
function isCompleted(){return state.sectionIdx>=SECTIONS.length;}
function quizLocked(){return isQuizStep()&&!state.quizPassed.includes(state.sectionIdx);}

function rebuildChat() { chat.innerHTML=""; for(let s=0;s<state.sectionIdx;s++){const sec=SECTIONS[s];const dv=renderSectionDivider(sec.title);makeInstant(dv);chat.appendChild(dv);sec.steps.forEach(step=>{const el=renderStep(step);makeInstant(el);chat.appendChild(el);});const note=document.createElement("div");note.className="keypoint";makeInstant(note);note.innerHTML=`<div class="keypoint-title">퀴즈 통과!</div><p>${sec.quiz.explanation}</p>`;chat.appendChild(note);} if(isCompleted()){chat.appendChild(renderCompletion());updateUI();scrollToBottom();return;} const sec=SECTIONS[state.sectionIdx];const dv=renderSectionDivider(sec.title);makeInstant(dv);chat.appendChild(dv);const sc=Math.min(state.stepIdx+1,sec.steps.length);for(let i=0;i<sc;i++){const el=renderStep(sec.steps[i]);if(i<sc-1)makeInstant(el);chat.appendChild(el);}if(isQuizStep()){const qEl=renderQuiz(sec.quiz,state.sectionIdx);chat.appendChild(qEl);if(state.quizPassed.includes(state.sectionIdx))markQuizPassed(qEl,sec.quiz);else bindQuiz(qEl,sec.quiz,state.sectionIdx);}chat.querySelectorAll("pre code.language-rust").forEach(el=>hljs.highlightElement(el));updateUI();scrollToBottom(); }

function bindQuiz(c,q,si){const bs=c.querySelectorAll(".quiz-option"),fb=c.querySelector(".quiz-feedback");bs.forEach(b=>{b.addEventListener("click",()=>{const idx=parseInt(b.dataset.idx);if(idx===q.answer){b.classList.add("correct");fb.className="quiz-feedback show correct";fb.innerHTML="정답! "+q.explanation;bs.forEach(x=>x.disabled=true);if(!state.quizPassed.includes(si)){state.quizPassed.push(si);saveState();}updateUI();}else{b.classList.add("wrong");b.disabled=true;fb.className="quiz-feedback show wrong";fb.textContent="틀렸어요. 다시 골라보세요!";}});});}
function markQuizPassed(c,q){const bs=c.querySelectorAll(".quiz-option"),fb=c.querySelector(".quiz-feedback");bs.forEach(b=>{if(parseInt(b.dataset.idx)===q.answer)b.classList.add("correct");b.disabled=true;});fb.className="quiz-feedback show correct";fb.innerHTML="정답! "+q.explanation;}

function next(){if(isCompleted()||quizLocked())return;const sec=SECTIONS[state.sectionIdx];if(state.stepIdx<sec.steps.length){state.stepIdx++;saveState();rebuildChat();}else if(state.quizPassed.includes(state.sectionIdx)){state.sectionIdx++;state.stepIdx=-1;saveState();if(isCompleted())rebuildChat();else next();}}
function prev(){if(state.stepIdx>0){state.stepIdx--;saveState();rebuildChat();}else if(state.sectionIdx>0){state.sectionIdx--;state.stepIdx=SECTIONS[state.sectionIdx].steps.length;saveState();rebuildChat();}}
function restart(){state={sectionIdx:0,stepIdx:-1,quizPassed:[]};saveState();next();}
function updateUI(){const done=isCompleted(),total=SECTIONS.length;progressFill.style.width=(done?100:(state.sectionIdx/total)*100)+"%";progressLabel.textContent=done?"완료!":`${state.sectionIdx+1} / ${total}`;btnPrev.disabled=(state.sectionIdx===0&&state.stepIdx<=0);if(done){btnNext.disabled=true;stepIndicator.textContent="";}else if(quizLocked()){btnNext.disabled=true;stepIndicator.textContent="퀴즈를 풀어주세요";}else{btnNext.disabled=false;const t=SECTIONS[state.sectionIdx].steps.length+1;stepIndicator.textContent=`${Math.min(state.stepIdx+1,t)} / ${t}`;}}
function scrollToBottom(){requestAnimationFrame(()=>{mainArea.scrollTop=mainArea.scrollHeight;});}

btnNext.addEventListener("click",next);btnPrev.addEventListener("click",prev);
document.getElementById("btnReset").addEventListener("click",()=>{if(confirm("진행 상태를 초기화하고 처음부터 시작할까요?"))restart();});
document.addEventListener("keydown",e=>{const tag=document.activeElement?.tagName;if(tag==="INPUT"||tag==="BUTTON")return;if(e.key==="Enter"||e.key==="ArrowRight")next();if(e.key==="ArrowLeft")prev();});
if(state.stepIdx===-1&&state.sectionIdx===0)next();else rebuildChat();
</script>
