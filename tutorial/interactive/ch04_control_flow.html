<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ch04: 제어 흐름 — 대화형 튜토리얼</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teacher-bg: #e3f2fd;
    --student-bg: #e8f5e9;
    --keypoint-bg: #fff8e1;
    --keypoint-border: #ffb300;
    --quiz-bg: #f3e5f5;
    --primary: #1565c0;
    --success: #2e7d32;
    --danger: #c62828;
    --text: #212121;
    --text-light: #757575;
    --bg: #fafafa;
    --header-h: 56px;
    --footer-h: 64px;
  }

  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  header {
    position: sticky; top: 0; z-index: 100;
    background: var(--primary); color: #fff;
    height: var(--header-h);
    display: flex; align-items: center; padding: 0 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  header h1 { font-size: 1.1rem; font-weight: 600; flex: 1; white-space: nowrap; }
  .reset-btn {
    background: none; border: 1px solid rgba(255,255,255,0.5); color: rgba(255,255,255,0.85);
    padding: 3px 10px; border-radius: 4px; font-size: 0.72rem; cursor: pointer;
    font-family: inherit; margin-right: 12px; transition: all 0.2s;
  }
  .reset-btn:hover { background: rgba(255,255,255,0.15); border-color: #fff; color: #fff; }
  .progress-wrapper { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; }
  .progress-bar { width: 120px; height: 6px; background: rgba(255,255,255,0.3); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: #fff; border-radius: 3px; transition: width 0.4s ease; }

  main { flex: 1; overflow-y: auto; padding: 20px 16px; padding-bottom: calc(var(--footer-h) + 20px); }
  .chat-container { max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }

  /* Bubbles */
  .bubble {
    max-width: 85%; padding: 14px 18px; border-radius: 18px; font-size: 0.95rem;
    opacity: 0; transform: translateY(20px); animation: slideUp 0.35s ease forwards;
    word-break: keep-all; overflow-wrap: break-word;
  }
  @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
  .bubble.teacher { align-self: flex-start; background: var(--teacher-bg); border-bottom-left-radius: 4px; }
  .bubble.student { align-self: flex-end; background: var(--student-bg); border-bottom-right-radius: 4px; }
  .bubble .role { font-size: 0.75rem; font-weight: 700; margin-bottom: 4px; }
  .bubble.teacher .role { color: var(--primary); }
  .bubble.student .role { color: var(--success); }
  .bubble p { margin: 6px 0; }
  .bubble p:first-of-type { margin-top: 0; }
  .bubble strong { font-weight: 600; }
  .bubble code { background: rgba(0,0,0,0.07); padding: 1px 5px; border-radius: 3px; font-size: 0.88em; font-family: 'Cascadia Code','Fira Code',Consolas,monospace; }
  .bubble pre { margin: 10px -8px; border-radius: 8px; overflow-x: auto; }
  .bubble pre code { background: none; padding: 14px 16px; display: block; font-size: 0.85em; line-height: 1.5; }
  .bubble ul, .bubble ol { padding-left: 20px; margin: 6px 0; }
  .bubble li { margin: 3px 0; }
  .bubble table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 0.88rem; }
  .bubble th, .bubble td { padding: 6px 10px; border: 1px solid rgba(0,0,0,0.12); text-align: left; }
  .bubble th { background: rgba(0,0,0,0.06); font-weight: 600; }

  /* Keypoint */
  .keypoint {
    max-width: 85%; align-self: center;
    background: var(--keypoint-bg); border-left: 4px solid var(--keypoint-border);
    border-radius: 8px; padding: 14px 18px; font-size: 0.9rem;
    opacity: 0; transform: translateY(20px); animation: slideUp 0.35s ease forwards;
  }
  .keypoint-title { font-weight: 700; color: #e65100; margin-bottom: 6px; font-size: 0.85rem; }
  .keypoint ul { padding-left: 18px; margin: 4px 0; }
  .keypoint li { margin: 3px 0; }
  .keypoint code { background: rgba(0,0,0,0.06); padding: 1px 4px; border-radius: 3px; font-family: 'Cascadia Code','Fira Code',Consolas,monospace; font-size: 0.88em; }

  /* Quiz */
  .quiz-card {
    max-width: 85%; align-self: center;
    background: var(--quiz-bg); border-radius: 16px; padding: 20px 22px;
    opacity: 0; transform: translateY(20px); animation: slideUp 0.35s ease forwards;
  }
  .quiz-card h3 { font-size: 0.95rem; margin-bottom: 14px; color: #6a1b9a; }
  .quiz-option {
    display: block; width: 100%; text-align: left; padding: 10px 14px; margin: 6px 0;
    border: 2px solid #ce93d8; border-radius: 10px; background: #fff;
    cursor: pointer; font-size: 0.9rem; font-family: inherit; transition: all 0.2s;
  }
  .quiz-option:hover:not(:disabled) { background: #f3e5f5; border-color: #ab47bc; }
  .quiz-option:disabled { cursor: default; }
  .quiz-option.correct { background: #c8e6c9; border-color: var(--success); color: var(--success); font-weight: 600; }
  .quiz-option.wrong { background: #ffcdd2; border-color: var(--danger); color: var(--danger); }
  .quiz-option code { font-family: 'Cascadia Code','Fira Code',Consolas,monospace; font-size: 0.88em; }
  .quiz-feedback { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 0.88rem; display: none; }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.correct { background: #c8e6c9; color: #1b5e20; }
  .quiz-feedback.wrong { background: #ffcdd2; color: #b71c1c; }

  /* Section divider */
  .section-divider { text-align: center; padding: 20px 0 10px; opacity: 0; animation: slideUp 0.35s ease forwards; }
  .section-divider span { display: inline-block; background: var(--primary); color: #fff; padding: 6px 18px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }

  /* ─── Interactive: Flashcard ─── */
  .flashcard-container {
    max-width: 85%; align-self: center; perspective: 800px;
    opacity: 0; transform: translateY(20px); animation: slideUp 0.35s ease forwards;
  }
  .flashcard {
    width: 100%; min-height: 160px; cursor: pointer; position: relative;
    transform-style: preserve-3d; transition: transform 0.5s ease;
    border-radius: 14px;
  }
  .flashcard.flipped { transform: rotateY(180deg); }
  .flashcard-face {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    backface-visibility: hidden; border-radius: 14px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 20px 24px; text-align: center; font-size: 0.92rem;
  }
  .flashcard-front { background: linear-gradient(135deg, #e3f2fd, #bbdefb); border: 2px solid #90caf9; }
  .flashcard-back { background: linear-gradient(135deg, #e8f5e9, #c8e6c9); border: 2px solid #81c784; transform: rotateY(180deg); }
  .flashcard-label { font-size: 0.72rem; font-weight: 700; color: var(--text-light); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
  .flashcard-content { font-size: 1rem; line-height: 1.5; }
  .flashcard-content code { background: rgba(0,0,0,0.08); padding: 1px 5px; border-radius: 3px; font-family: 'Cascadia Code','Fira Code',Consolas,monospace; font-size: 0.9em; }
  .flashcard-hint { font-size: 0.75rem; color: var(--text-light); margin-top: 10px; }
  .flashcard-nav { display: flex; justify-content: center; gap: 8px; margin-top: 10px; }
  .flashcard-nav button {
    padding: 5px 14px; border: 1px solid #90caf9; border-radius: 6px;
    background: #fff; cursor: pointer; font-size: 0.8rem; font-family: inherit;
  }
  .flashcard-nav button:hover { background: #e3f2fd; }
  .flashcard-counter { font-size: 0.75rem; color: var(--text-light); text-align: center; margin-top: 6px; }

  /* ─── Interactive: Fill-in-the-blank ─── */
  .fill-blank-card {
    max-width: 85%; align-self: center;
    background: #e8eaf6; border-radius: 14px; padding: 20px 22px;
    opacity: 0; transform: translateY(20px); animation: slideUp 0.35s ease forwards;
  }
  .fill-blank-card h3 { font-size: 0.9rem; color: #283593; margin-bottom: 12px; }
  .fill-blank-card pre { margin: 8px 0; border-radius: 8px; overflow-x: auto; }
  .fill-blank-card pre code { padding: 14px 16px; display: block; font-size: 0.85em; line-height: 1.5; }
  .blank-input {
    display: inline-block; width: 120px; padding: 3px 8px; margin: 0 2px;
    border: 2px dashed #5c6bc0; border-radius: 6px; background: #fff;
    font-family: 'Cascadia Code','Fira Code',Consolas,monospace; font-size: 0.88em;
    text-align: center; outline: none; transition: border-color 0.2s;
  }
  .blank-input:focus { border-color: #283593; }
  .blank-input.correct { border-color: var(--success); background: #c8e6c9; border-style: solid; }
  .blank-input.wrong { border-color: var(--danger); background: #ffcdd2; border-style: solid; }
  .fill-check-btn {
    display: block; margin: 14px auto 0; padding: 8px 24px;
    background: #3f51b5; color: #fff; border: none; border-radius: 8px;
    cursor: pointer; font-family: inherit; font-size: 0.88rem;
  }
  .fill-check-btn:hover { background: #283593; }
  .fill-check-btn:disabled { opacity: 0.4; cursor: default; }
  .fill-feedback { margin-top: 10px; padding: 8px 12px; border-radius: 6px; font-size: 0.85rem; display: none; text-align: center; }
  .fill-feedback.show { display: block; }
  .fill-feedback.correct { background: #c8e6c9; color: #1b5e20; }
  .fill-feedback.wrong { background: #ffcdd2; color: #b71c1c; }

  /* ─── Interactive: Drag-fill ─── */
  .drag-fill-card {
    max-width: 85%; align-self: center;
    background: #e8eaf6; border-radius: 14px; padding: 20px 22px;
    opacity: 0; transform: translateY(20px); animation: slideUp 0.35s ease forwards;
  }
  .drag-fill-card h3 { font-size: 0.9rem; color: #283593; margin-bottom: 8px; }
  .drag-fill-card pre { margin: 8px 0; border-radius: 8px; overflow-x: auto; }
  .drag-fill-card pre code { padding: 14px 16px; display: block; font-size: 0.85em; line-height: 1.5; }
  .drag-candidates {
    display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0;
    justify-content: center;
  }
  .drag-chip {
    display: inline-block; padding: 6px 14px;
    background: #fff; border: 2px solid #7986cb; border-radius: 20px;
    font-family: 'Cascadia Code','Fira Code',Consolas,monospace; font-size: 0.88em;
    cursor: grab; user-select: none; transition: all 0.2s;
  }
  .drag-chip:hover { background: #c5cae9; }
  .drag-chip.dragging { opacity: 0.4; }
  .drag-chip.used { opacity: 0.3; cursor: default; border-style: dashed; }
  .drag-slot {
    display: inline-block; min-width: 60px; padding: 3px 10px; margin: 0 2px;
    border: 2px dashed #7986cb; border-radius: 6px; background: rgba(255,255,255,0.7);
    font-family: 'Cascadia Code','Fira Code',Consolas,monospace; font-size: 0.88em;
    text-align: center; min-height: 1.6em; vertical-align: middle;
    transition: all 0.2s; cursor: pointer;
  }
  .drag-slot.dragover { background: #c5cae9; border-color: #3949ab; }
  .drag-slot.filled { background: #e8eaf6; border-style: solid; border-color: #5c6bc0; }
  .drag-slot.correct { background: #c8e6c9; border-color: var(--success); border-style: solid; }
  .drag-slot.wrong { background: #ffcdd2; border-color: var(--danger); border-style: solid; }

  /* ─── Interactive: Match game ─── */
  .match-card {
    max-width: 85%; align-self: center;
    background: #fce4ec; border-radius: 14px; padding: 20px 22px;
    opacity: 0; transform: translateY(20px); animation: slideUp 0.35s ease forwards;
  }
  .match-card h3 { font-size: 0.9rem; color: #880e4f; margin-bottom: 14px; }
  .match-columns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  .match-col { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 140px; }
  .match-col-label { font-size: 0.75rem; font-weight: 700; color: var(--text-light); text-align: center; margin-bottom: 4px; }
  .match-item {
    padding: 10px 14px; border-radius: 10px; text-align: center;
    font-size: 0.88rem; cursor: pointer; transition: all 0.2s; user-select: none;
    font-family: inherit;
  }
  .match-left { background: #fff; border: 2px solid #f48fb1; }
  .match-left:hover { background: #fce4ec; }
  .match-left.selected { background: #f48fb1; color: #fff; border-color: #e91e63; }
  .match-left.matched { background: #c8e6c9; border-color: var(--success); color: var(--success); cursor: default; }
  .match-right { background: #fff; border: 2px solid #ce93d8; }
  .match-right:hover { background: #f3e5f5; }
  .match-right.selected { background: #ce93d8; color: #fff; border-color: #9c27b0; }
  .match-right.matched { background: #c8e6c9; border-color: var(--success); color: var(--success); cursor: default; }
  .match-right.wrong-flash { animation: wrongShake 0.4s ease; }
  @keyframes wrongShake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .match-item code { font-family: 'Cascadia Code','Fira Code',Consolas,monospace; font-size: 0.88em; }
  .match-feedback { margin-top: 12px; padding: 8px 12px; border-radius: 6px; font-size: 0.85rem; text-align: center; display: none; }
  .match-feedback.show { display: block; }
  .match-feedback.correct { background: #c8e6c9; color: #1b5e20; }

  /* ─── Interactive: Compile Check ─── */
  .compile-check-card {
    max-width: 85%; align-self: center;
    background: #e0f2f1; border-radius: 14px; padding: 20px 22px;
    opacity: 0; transform: translateY(20px); animation: slideUp 0.35s ease forwards;
  }
  .compile-check-card h3 { font-size: 0.9rem; color: #00695c; margin-bottom: 14px; }
  .cc-item {
    background: #fff; border: 2px solid #80cbc4; border-radius: 10px;
    margin: 10px 0; padding: 12px 14px; transition: all 0.3s;
  }
  .cc-item pre { margin: 0 0 10px; border-radius: 6px; overflow-x: auto; }
  .cc-item pre code { padding: 10px 14px; display: block; font-size: 0.83em; line-height: 1.45; }
  .cc-buttons { display: flex; gap: 8px; }
  .cc-btn {
    flex: 1; padding: 8px; border: 2px solid #b2dfdb; border-radius: 8px;
    background: #fff; cursor: pointer; font-family: inherit; font-size: 0.85rem;
    font-weight: 600; transition: all 0.2s;
  }
  .cc-btn:hover:not(:disabled) { background: #e0f2f1; }
  .cc-btn:disabled { cursor: default; opacity: 0.7; }
  .cc-btn.btn-ok { color: var(--success); }
  .cc-btn.btn-err { color: var(--danger); }
  .cc-btn.chosen-correct { background: #c8e6c9; border-color: var(--success); }
  .cc-btn.chosen-wrong { background: #ffcdd2; border-color: var(--danger); }
  .cc-item.resolved { border-color: #c8e6c9; }
  .cc-explain {
    margin-top: 8px; padding: 8px 12px; border-radius: 6px;
    font-size: 0.83rem; display: none;
  }
  .cc-explain.show { display: block; }
  .cc-explain.correct { background: #c8e6c9; color: #1b5e20; }
  .cc-explain.wrong { background: #ffcdd2; color: #b71c1c; }
  .cc-score {
    margin-top: 14px; text-align: center; font-size: 0.9rem; font-weight: 700;
    color: #00695c; display: none;
  }
  .cc-score.show { display: block; }

  /* Completion */
  .completion { text-align: center; padding: 40px 20px; opacity: 0; animation: slideUp 0.5s ease forwards; }
  .completion h2 { font-size: 1.5rem; margin-bottom: 12px; color: var(--primary); }
  .completion p { color: var(--text-light); margin: 6px 0; }
  .completion .summary-table { margin: 20px auto; border-collapse: collapse; font-size: 0.9rem; }
  .completion .summary-table th, .completion .summary-table td { padding: 8px 16px; border: 1px solid #e0e0e0; text-align: left; }
  .completion .summary-table th { background: var(--primary); color: #fff; }
  .completion .summary-table code { font-family: 'Cascadia Code','Fira Code',Consolas,monospace; font-size: 0.88em; }
  .restart-btn { margin-top: 20px; padding: 10px 28px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; font-family: inherit; }
  .restart-btn:hover { background: #0d47a1; }

  /* Footer */
  footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--footer-h); background: #fff; border-top: 1px solid #e0e0e0;
    display: flex; align-items: center; justify-content: center; gap: 16px;
    padding: 0 20px; z-index: 100;
  }
  .nav-btn { padding: 10px 32px; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s; }
  .nav-btn:disabled { opacity: 0.4; cursor: default; }
  .btn-prev { background: #e0e0e0; color: var(--text); }
  .btn-prev:hover:not(:disabled) { background: #bdbdbd; }
  .btn-next { background: var(--primary); color: #fff; }
  .btn-next:hover:not(:disabled) { background: #0d47a1; }
  .step-indicator { font-size: 0.8rem; color: var(--text-light); min-width: 60px; text-align: center; }

  @media (max-width: 600px) {
    header h1 { font-size: 0.95rem; }
    .progress-bar { width: 80px; }
    .bubble, .keypoint, .quiz-card, .flashcard-container, .fill-blank-card, .drag-fill-card, .match-card, .compile-check-card { max-width: 92%; font-size: 0.9rem; }
    .nav-btn { padding: 10px 24px; font-size: 0.9rem; }
    .match-columns { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <h1>Ch04: 제어 흐름</h1>
  <button class="reset-btn" id="btnReset" title="처음부터 다시 시작">초기화</button>
  <div class="progress-wrapper">
    <span id="progressLabel">1 / 6</span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
</header>

<main id="mainArea">
  <div class="chat-container" id="chat"></div>
</main>

<footer>
  <button class="nav-btn btn-prev" id="btnPrev" disabled>이전</button>
  <span class="step-indicator" id="stepIndicator"></span>
  <button class="nav-btn btn-next" id="btnNext">다음</button>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/rust.min.js"></script>
<script>
// ─── Content Data ───────────────────────────────────────────────────────────

const SECTIONS = [
  // ── Section 1: if는 표현식이다 ──
  {
    title: "1. if는 표현식이다",
    steps: [
      { type: "teacher", html: `<p>Rust의 <code>if</code>는 값을 만들어내는 <strong>표현식</strong>이에요.</p>
<pre><code class="language-rust">// 일반적인 if
if score > 90 {
    println!("A");
} else if score > 80 {
    println!("B");
} else {
    println!("C");
}

// Rust만의 방식 — if를 값으로 사용
let grade = if score > 90 { "A" } else { "B" };</code></pre>` },
      { type: "teacher", html: `<p>주의: <strong>양쪽 타입이 같아야 해요.</strong></p>
<pre><code class="language-rust">let x = if true { 5 } else { "hello" };
// 에러! i32와 &str가 다름</code></pre>
<p>컴파일러가 <code>x</code>의 타입을 하나로 확정해야 하니까요.</p>` },
      { type: "student", html: `<p>컴파일 타임에 잡자라는 부분은 왜 계속 강조되는 거죠?</p>` },
      { type: "teacher", html: `<p>실무적으로 말하면:</p>
<ul>
<li><strong>런타임에 터지면</strong> → 서비스가 죽어요. 유저가 피해를 봐요.</li>
<li><strong>컴파일 타임에 잡으면</strong> → 빌드가 안 돼요. 개발자가 바로 고쳐요.</li>
</ul>
<p>불변 기본, 타입 명시, 표현식 중심 — 다 "런타임에 터질 걸 컴파일 타임으로 끌어오자"의 구체적인 방법들이에요.</p>` },
      { type: "student", html: `<p>그러면 <code>if false { 5 } else { 10 }</code>은? 어차피 false인데 에러 아니야?</p>` },
      { type: "teacher", html: `<p>아뇨, <strong>컴파일러는 조건의 참/거짓 값을 평가하지 않아요.</strong> 구조만 봅니다.</p>
<pre><code class="language-rust">let x: i32 = if false { 5 } else { 10 }; // OK!</code></pre>

const STORAGE_KEY = "ch04_progress";
let state = loadState();

function loadState() {
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) return JSON.parse(s); } catch {}
  return { sectionIdx: 0, stepIdx: -1, quizPassed: [] };
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

// ── Flashcard ──
function renderFlashcard(config) {
  const d = document.createElement("div");
  d.className = "flashcard-container";
  d.innerHTML = `<div style="font-size:0.85rem;font-weight:700;color:var(--primary);margin-bottom:10px;text-align:center;">${config.title}</div>
<div class="flashcard" id="fc-active">
  <div class="flashcard-face flashcard-front">
    <div class="flashcard-label">질문</div>
    <div class="flashcard-content" id="fc-front-content"></div>
    <div class="flashcard-hint">클릭해서 뒤집기</div>
  </div>
  <div class="flashcard-face flashcard-back">
    <div class="flashcard-label">정답</div>
    <div class="flashcard-content" id="fc-back-content"></div>
    <div class="flashcard-hint">클릭해서 돌아가기</div>
  </div>
</div>
<div class="flashcard-nav">
  <button id="fc-prev-btn">이전</button>
  <button id="fc-next-btn">다음</button>
</div>
<div class="flashcard-counter" id="fc-counter"></div>`;

  requestAnimationFrame(() => {
    const cards = config.cards;
    let idx = 0;
    const fc = d.querySelector("#fc-active");
    const frontC = d.querySelector("#fc-front-content");
    const backC = d.querySelector("#fc-back-content");
    const counter = d.querySelector("#fc-counter");
    const prevB = d.querySelector("#fc-prev-btn");
    const nextB = d.querySelector("#fc-next-btn");

    function show() {
      fc.classList.remove("flipped");
      frontC.innerHTML = cards[idx].front;
      backC.innerHTML = cards[idx].back;
      counter.textContent = `${idx + 1} / ${cards.length}`;
      // Set min-height based on content
      const h = Math.max(frontC.scrollHeight, backC.scrollHeight, 100);
      fc.style.minHeight = Math.max(h + 80, 160) + "px";
    }
    fc.addEventListener("click", () => fc.classList.toggle("flipped"));
    prevB.addEventListener("click", (e) => { e.stopPropagation(); if (idx > 0) { idx--; show(); }});
    nextB.addEventListener("click", (e) => { e.stopPropagation(); if (idx < cards.length - 1) { idx++; show(); }});
    show();
  });
  return d;
}

// ── Fill-in-the-blank ──
function renderFillBlank(config) {
  const d = document.createElement("div");
  d.className = "fill-blank-card";

  // Build answer lookup from config (avoids HTML attribute quoting issues)
  const answerMap = {};
  config.blanks.forEach(b => { answerMap[b.id] = b.answer; });

  let codeHtml = config.template;
  config.blanks.forEach(b => {
    codeHtml = codeHtml.replace(`__${b.id}__`,
      `<input type="text" class="blank-input" data-id="${b.id}" style="width:${b.width}" placeholder="${b.hint || '?'}">`);
  });

  d.innerHTML = `<h3>${config.title}</h3>
<p style="font-size:0.85rem;margin-bottom:10px;">${config.description}</p>
<pre><code>${codeHtml}</code></pre>
<button class="fill-check-btn">확인</button>
<div class="fill-feedback"></div>`;

  requestAnimationFrame(() => {
    const checkBtn = d.querySelector(".fill-check-btn");
    const feedback = d.querySelector(".fill-feedback");
    const inputs = d.querySelectorAll(".blank-input");

    function normalize(s) {
      return s.replace(/[\u201C\u201D\u2018\u2019""'']/g, '"').replace(/\s+/g, '');
    }

    checkBtn.addEventListener("click", () => {
      let allCorrect = true;
      inputs.forEach(inp => {
        const val = inp.value.trim();
        const ans = answerMap[inp.dataset.id];
        if (normalize(val) === normalize(ans)) {
          inp.classList.remove("wrong");
          inp.classList.add("correct");
          inp.disabled = true;
        } else {
          inp.classList.remove("correct");
          inp.classList.add("wrong");
          allCorrect = false;
        }
      });
      if (allCorrect) {
        feedback.className = "fill-feedback show correct";
        feedback.textContent = "정답! " + config.successMsg;
        checkBtn.disabled = true;
      } else {
        feedback.className = "fill-feedback show wrong";
        feedback.textContent = "틀린 칸이 있어요. 다시 시도해보세요!";
      }
    });

    // Enter key in inputs triggers check
    inputs.forEach(inp => {
      inp.addEventListener("keydown", e => {
        if (e.key === "Enter") { e.preventDefault(); e.stopPropagation(); checkBtn.click(); }
      });
    });
  });
  return d;
}

// ── Match game ──
function renderMatch(config) {
  const d = document.createElement("div");
  d.className = "match-card";

  // Shuffle right side
  const rights = config.pairs.map(p => p.right);
  const shuffled = [...rights].sort(() => Math.random() - 0.5);

  d.innerHTML = `<h3>${config.title}</h3><p style="font-size:0.83rem;margin-bottom:12px;">왼쪽을 선택한 뒤, 매칭되는 오른쪽을 클릭하세요.</p>
<div class="match-columns">
  <div class="match-col">
    <div class="match-col-label">언어</div>
    ${config.pairs.map((p,i) => `<div class="match-item match-left" data-idx="${i}">${p.left}</div>`).join("")}
  </div>
  <div class="match-col">
    <div class="match-col-label">안전 전략</div>
    ${shuffled.map((r,i) => `<div class="match-item match-right" data-val="${r}">${r}</div>`).join("")}
  </div>
</div>
<div class="match-feedback"></div>`;

  requestAnimationFrame(() => {
    let selectedLeft = null;
    let matchedCount = 0;
    const lefts = d.querySelectorAll(".match-left");
    const rghts = d.querySelectorAll(".match-right");
    const fb = d.querySelector(".match-feedback");

    lefts.forEach(el => {
      el.addEventListener("click", () => {
        if (el.classList.contains("matched")) return;
        lefts.forEach(l => l.classList.remove("selected"));
        el.classList.add("selected");
        selectedLeft = el;
      });
    });

    rghts.forEach(el => {
      el.addEventListener("click", () => {
        if (!selectedLeft || el.classList.contains("matched")) return;
        const leftIdx = parseInt(selectedLeft.dataset.idx);
        const expected = config.pairs[leftIdx].right;
        if (el.dataset.val === expected) {
          selectedLeft.classList.remove("selected");
          selectedLeft.classList.add("matched");
          el.classList.add("matched");
          matchedCount++;
          selectedLeft = null;
          if (matchedCount === config.pairs.length) {
            fb.className = "match-feedback show correct";
            fb.textContent = "모두 맞았어요!";
          }
        } else {
          el.classList.add("wrong-flash");
          setTimeout(() => el.classList.remove("wrong-flash"), 400);
        }
      });
    });
  });
  return d;
}

// ── Compile Check ──
function renderCompileCheck(config) {
  const d = document.createElement("div");
  d.className = "compile-check-card";
  let itemsHtml = config.items.map((item, i) => {
    const codeEsc = item.code.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    return `<div class="cc-item" data-idx="${i}">
  <pre><code class="language-rust">${codeEsc}</code></pre>
  <div class="cc-buttons">
    <button class="cc-btn btn-ok" data-choice="ok">컴파일 OK</button>
    <button class="cc-btn btn-err" data-choice="err">컴파일 에러</button>
  </div>
  <div class="cc-explain"></div>
</div>`;
  }).join("");
  d.innerHTML = `<h3>${config.title}</h3>${itemsHtml}<div class="cc-score"></div>`;

  requestAnimationFrame(() => {
    let answered = 0;
    const total = config.items.length;
    let correct = 0;
    const scoreEl = d.querySelector(".cc-score");

    config.items.forEach((item, i) => {
      const ccItem = d.querySelectorAll(".cc-item")[i];
      const btns = ccItem.querySelectorAll(".cc-btn");
      const explain = ccItem.querySelector(".cc-explain");

      btns.forEach(btn => {
        btn.addEventListener("click", () => {
          const choice = btn.dataset.choice;
          const isCorrect = (choice === "ok") === item.compiles;
          btns.forEach(b => b.disabled = true);
          if (isCorrect) {
            btn.classList.add("chosen-correct");
            explain.className = "cc-explain show correct";
            explain.textContent = "정답! " + item.explain;
            correct++;
          } else {
            btn.classList.add("chosen-wrong");
            // Highlight the correct one
            const correctBtn = item.compiles
              ? ccItem.querySelector(".btn-ok")
              : ccItem.querySelector(".btn-err");
            correctBtn.classList.add("chosen-correct");
            explain.className = "cc-explain show wrong";
            explain.textContent = "오답! " + item.explain;
          }
          ccItem.classList.add("resolved");
          answered++;
          if (answered === total) {
            scoreEl.className = "cc-score show";
            scoreEl.textContent = `결과: ${total}문제 중 ${correct}문제 정답!` +
              (correct === total ? " 완벽해요!" : "");
          }
        });
      });
    });
    // Highlight code
    d.querySelectorAll("pre code.language-rust").forEach(el => hljs.highlightElement(el));
  });
  return d;
}

function renderDragFill(config) {

  let codeHtml = config.template;
  config.blanks.forEach(b => {
    codeHtml = codeHtml.replace(`__${b.id}__`,
      `<span class="drag-slot" data-id="${b.id}" data-filled=""></span>`);
  });

  const chipsHtml = config.candidates.map((c, i) =>
    `<span class="drag-chip" draggable="true" data-val="${i}">${c}</span>`
  ).join("");

  d.innerHTML = `<h3>${config.title}</h3>
<p style="font-size:0.85rem;margin-bottom:10px;">${config.description}</p>
<div class="drag-candidates">${chipsHtml}</div>
<pre><code>${codeHtml}</code></pre>
<button class="fill-check-btn">확인</button>
<div class="fill-feedback"></div>`;

  requestAnimationFrame(() => {
    const chips = d.querySelectorAll(".drag-chip");
    const slots = d.querySelectorAll(".drag-slot");
    const checkBtn = d.querySelector(".fill-check-btn");
    const feedback = d.querySelector(".fill-feedback");
    let draggedChip = null;

    // Drag from chip
    chips.forEach(chip => {
      chip.addEventListener("dragstart", e => {
        if (chip.classList.contains("used")) { e.preventDefault(); return; }
        draggedChip = chip;
        chip.classList.add("dragging");
        e.dataTransfer.effectAllowed = "move";
      });
      chip.addEventListener("dragend", () => {
        chip.classList.remove("dragging");
        draggedChip = null;
      });
      // Click-to-select on mobile
      chip.addEventListener("click", () => {
        if (chip.classList.contains("used")) return;
        chips.forEach(c => c.classList.remove("dragging"));
        if (draggedChip === chip) { draggedChip = null; return; }
        draggedChip = chip;
        chip.classList.add("dragging");
      });
    });

    slots.forEach(slot => {
      slot.addEventListener("dragover", e => { e.preventDefault(); slot.classList.add("dragover"); });
      slot.addEventListener("dragleave", () => slot.classList.remove("dragover"));
      slot.addEventListener("drop", e => {
        e.preventDefault();
        slot.classList.remove("dragover");
        if (!draggedChip) return;
        placeChip(slot, draggedChip);
      });
      // Click-to-place on mobile
      slot.addEventListener("click", () => {
        if (draggedChip) {
          placeChip(slot, draggedChip);
        } else if (slot.dataset.filled !== "") {
          // Click filled slot to remove
          const chipIdx = slot.dataset.filled;
          const chip = d.querySelector(`.drag-chip[data-val="${chipIdx}"]`);
          if (chip) chip.classList.remove("used");
          slot.textContent = "";
          slot.dataset.filled = "";
          slot.classList.remove("filled", "correct", "wrong");
        }
      });
    });

    function placeChip(slot, chip) {
      // If slot already has a chip, free it
      if (slot.dataset.filled !== "") {
        const oldIdx = slot.dataset.filled;
        const oldChip = d.querySelector(`.drag-chip[data-val="${oldIdx}"]`);
        if (oldChip) oldChip.classList.remove("used");
      }
      slot.textContent = chip.textContent;
      slot.dataset.filled = chip.dataset.val;
      slot.classList.add("filled");
      slot.classList.remove("correct", "wrong");
      chip.classList.remove("dragging");
      chip.classList.add("used");
      draggedChip = null;
    }

    checkBtn.addEventListener("click", () => {
      let allCorrect = true;
      let allFilled = true;
      slots.forEach(slot => {
        const id = slot.dataset.id;
        const ans = answerMap[id];
        const val = slot.textContent.trim();
        if (!val) { allFilled = false; allCorrect = false; return; }
        if (val === ans) {
          slot.classList.remove("wrong");
          slot.classList.add("correct");
        } else {
          slot.classList.remove("correct");
          slot.classList.add("wrong");
          allCorrect = false;
        }
      });
      if (!allFilled) {
        feedback.className = "fill-feedback show wrong";
        feedback.textContent = "빈칸을 모두 채워주세요!";
      } else if (allCorrect) {
        feedback.className = "fill-feedback show correct";
        feedback.textContent = "정답! " + config.successMsg;
        checkBtn.disabled = true;
        chips.forEach(c => c.style.cursor = "default");
      } else {
        feedback.className = "fill-feedback show wrong";
        feedback.textContent = "틀린 칸이 있어요. 빈칸을 클릭해서 빼고 다시 넣어보세요!";
      }
    });
  });
  return d;
}

// ── Generic step renderer ──
function renderStep(step) {
  if (step.type === "flashcard") return renderFlashcard(step.config);
  if (step.type === "fill-blank") return renderFillBlank(step.config);
  if (step.type === "drag-fill") return renderDragFill(step.config);
  if (step.type === "match") return renderMatch(step.config);
  if (step.type === "compile-check") return renderCompileCheck(step.config);
  return renderBubble(step);
}

function isInteractive(step) {
  return ["flashcard","fill-blank","drag-fill","match","compile-check"].includes(step.type);
}

// ─── Completion ─────────────────────────────────────────────────────────────

function renderCompletion() {
  const d = document.createElement("div");
  d.className = "completion";
  d.innerHTML = `<h2>학습 완료!</h2>
<p>Ch04 제어 흐름 튜토리얼을 모두 마쳤습니다.</p>
<table class="summary-table">
<tr><th>개념</th><th>의도</th><th>컴파일러 해석</th></tr>
<tr><td><code>if/else</code></td><td>조건 분기 (표현식)</td><td>양쪽 타입 일치 검사</td></tr>
<tr><td><code>loop</code></td><td>무한 반복</td><td>반드시 진입</td></tr>
<tr><td><code>while</code></td><td>조건부 반복</td><td>안 돌 수도 있음</td></tr>
<tr><td><code>for</code></td><td>범위/컬렉션 순회</td><td>가장 안전</td></tr>
</table>
<p style="margin-top:16px;font-size:0.9rem;">다음: <strong>Ch05 소유권</strong>에서 빌림 규칙을 본격적으로 배웁니다!</p>
<button class="restart-btn" onclick="restart()">처음부터 다시</button>`;
  return d;
}

// ─── Core logic ─────────────────────────────────────────────────────────────

function isQuizStep() { return state.stepIdx >= SECTIONS[state.sectionIdx].steps.length; }
function isCompleted() { return state.sectionIdx >= SECTIONS.length; }
function quizLocked() { return isQuizStep() && !state.quizPassed.includes(state.sectionIdx); }

function rebuildChat() {
  chat.innerHTML = "";

  // Past sections
  for (let s = 0; s < state.sectionIdx; s++) {
    const sec = SECTIONS[s];
    const divider = renderSectionDivider(sec.title);
    makeInstant(divider); chat.appendChild(divider);
    sec.steps.forEach(step => {
      const el = renderStep(step);
      makeInstant(el); chat.appendChild(el);
    });
    const note = document.createElement("div");
    note.className = "keypoint";
    makeInstant(note);
    note.innerHTML = `<div class="keypoint-title">퀴즈 통과!</div><p>${sec.quiz.explanation}</p>`;
    chat.appendChild(note);
  }

  if (isCompleted()) {
    chat.appendChild(renderCompletion());
    updateUI(); scrollToBottom();
    return;
  }

  // Current section
  const sec = SECTIONS[state.sectionIdx];
  const divider = renderSectionDivider(sec.title);
  makeInstant(divider); chat.appendChild(divider);

  const showCount = Math.min(state.stepIdx + 1, sec.steps.length);
  for (let i = 0; i < showCount; i++) {
    const el = renderStep(sec.steps[i]);
    if (i < showCount - 1) makeInstant(el);
    chat.appendChild(el);
  }

  if (isQuizStep()) {
    const qEl = renderQuiz(sec.quiz, state.sectionIdx);
    chat.appendChild(qEl);
    if (state.quizPassed.includes(state.sectionIdx)) {
      markQuizPassed(qEl, sec.quiz);
    } else {
      bindQuiz(qEl, sec.quiz, state.sectionIdx);
    }
  }

  chat.querySelectorAll("pre code.language-rust").forEach(el => hljs.highlightElement(el));
  updateUI(); scrollToBottom();
}

function makeInstant(el) {
  el.style.animation = "none";
  el.style.opacity = "1";
  el.style.transform = "none";
}

function bindQuiz(container, quiz, secIdx) {
  const btns = container.querySelectorAll(".quiz-option");
  const fb = container.querySelector(".quiz-feedback");
  btns.forEach(btn => {
    btn.addEventListener("click", () => {
      const idx = parseInt(btn.dataset.idx);
      if (idx === quiz.answer) {
        btn.classList.add("correct");
        fb.className = "quiz-feedback show correct";
        fb.innerHTML = "정답! " + quiz.explanation;
        btns.forEach(b => b.disabled = true);
        if (!state.quizPassed.includes(secIdx)) { state.quizPassed.push(secIdx); saveState(); }
        updateUI();
      } else {
        btn.classList.add("wrong"); btn.disabled = true;
        fb.className = "quiz-feedback show wrong";
        fb.textContent = "틀렸어요. 다시 골라보세요!";
      }
    });
  });
}

function markQuizPassed(container, quiz) {
  const btns = container.querySelectorAll(".quiz-option");
  const fb = container.querySelector(".quiz-feedback");
  btns.forEach(btn => {
    if (parseInt(btn.dataset.idx) === quiz.answer) btn.classList.add("correct");
    btn.disabled = true;
  });
  fb.className = "quiz-feedback show correct";
  fb.innerHTML = "정답! " + quiz.explanation;
}

function next() {
  if (isCompleted() || quizLocked()) return;
  const sec = SECTIONS[state.sectionIdx];
  if (state.stepIdx < sec.steps.length) {
    state.stepIdx++; saveState(); rebuildChat();
  } else if (state.quizPassed.includes(state.sectionIdx)) {
    state.sectionIdx++; state.stepIdx = -1; saveState();
    if (isCompleted()) rebuildChat(); else next();
  }
}

function prev() {
  if (state.stepIdx > 0) {
    state.stepIdx--; saveState(); rebuildChat();
  } else if (state.sectionIdx > 0) {
    state.sectionIdx--;
    state.stepIdx = SECTIONS[state.sectionIdx].steps.length;
    saveState(); rebuildChat();
  }
}

function restart() {
  state = { sectionIdx: 0, stepIdx: -1, quizPassed: [] };
  saveState(); next();
}

function updateUI() {
  const done = isCompleted();
  const total = SECTIONS.length;
  progressFill.style.width = (done ? 100 : (state.sectionIdx / total) * 100) + "%";
  progressLabel.textContent = done ? "완료!" : `${state.sectionIdx + 1} / ${total}`;
  btnPrev.disabled = (state.sectionIdx === 0 && state.stepIdx <= 0);
  if (done) { btnNext.disabled = true; stepIndicator.textContent = ""; }
  else if (quizLocked()) { btnNext.disabled = true; stepIndicator.textContent = "퀴즈를 풀어주세요"; }
  else {
    btnNext.disabled = false;
    const t = SECTIONS[state.sectionIdx].steps.length + 1;
    stepIndicator.textContent = `${Math.min(state.stepIdx + 1, t)} / ${t}`;
  }
}

function scrollToBottom() {
  requestAnimationFrame(() => { mainArea.scrollTop = mainArea.scrollHeight; });
}

// ─── Events ─────────────────────────────────────────────────────────────────

btnNext.addEventListener("click", next);
btnPrev.addEventListener("click", prev);
document.getElementById("btnReset").addEventListener("click", () => {
  if (confirm("진행 상태를 초기화하고 처음부터 시작할까요?")) restart();
});
document.addEventListener("keydown", e => {
  // Don't hijack Enter when focused on interactive elements
  const tag = document.activeElement?.tagName;
  if (tag === "INPUT" || tag === "BUTTON") return;
  if (e.key === "Enter" || e.key === "ArrowRight") next();
  if (e.key === "ArrowLeft") prev();
});

// ─── Init ───────────────────────────────────────────────────────────────────

if (state.stepIdx === -1 && state.sectionIdx === 0) next();
else rebuildChat();
</script>
